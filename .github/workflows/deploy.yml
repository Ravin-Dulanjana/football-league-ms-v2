# =============================================================================
# Football League MS — CI/CD Pipeline
#
# Trigger: every push to the main branch.
#
# Jobs:
#   1. test   — lint with ruff, run pytest (uses SQLite in-memory, no DB needed)
#   2. deploy — SSH into EC2, pull latest code, run migrations, restart gunicorn
#              (only runs when test passes — enforced by `needs: test`)
#
# Required GitHub Secrets:
#   EC2_HOST    — public IP of the EC2 instance  (e.g. 52.221.233.178)
#   EC2_USER    — SSH username                   (ec2-user)
#   EC2_SSH_KEY — private key content from football-league-key.pem
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — test
  #
  # Runs on a fresh Ubuntu VM. Installs dev dependencies, lints, and tests.
  # Tests use an in-memory SQLite database — no PostgreSQL server is needed.
  # If any step returns a non-zero exit code, the job fails and deploy is skipped.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip packages keyed on requirements.txt + pyproject.toml.
          # First run downloads everything; subsequent runs restore from cache
          # and finish in seconds instead of ~30 seconds.
          cache: pip

      - name: Install dependencies
        # -e installs the project in editable mode so `from app import ...`
        # resolves correctly. [dev] pulls in pytest, ruff, httpx, mypy, etc.
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        # ruff check catches unused imports, undefined names, formatting issues.
        # --output-format=github prints annotations directly in the PR diff view.
        run: ruff check . --output-format=github

      - name: Run tests
        # -v shows each test name; --tb=short keeps tracebacks readable.
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2 — deploy
  #
  # Only starts after `test` completes successfully (`needs: test`).
  # Opens an SSH connection to the EC2 and runs a deploy script.
  #
  # The deploy script is idempotent — safe to run multiple times:
  #   git fetch + reset — forces EC2 to exactly match origin/main, discarding
  #                       any local edits (safer than `git pull` which aborts
  #                       when uncommitted local changes exist)
  #   pip install       — skips already-installed packages
  #   alembic           — no-op if already at head
  #   systemctl         — restart is always applied (picks up new code)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test  # ← this is the gate: deploy is skipped if test fails

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # script runs on the EC2 as ec2-user.
          # set -e causes the whole script to abort if any command fails —
          # so a broken migration or failed pip install stops the deploy
          # before gunicorn is restarted with broken code.
          script: |
            set -e

            # Git 2.35+ refuses to run in repos owned by a different user.
            # /opt/football-league was created by root (initial setup) but
            # the SSH session runs as ec2-user, triggering the check.
            git config --global --add safe.directory /opt/football-league

            cd /opt/football-league

            echo "=== Pulling latest code ==="
            export GIT_TERMINAL_PROMPT=0
            git fetch origin main
            git reset --hard origin/main

            echo "=== Installing/updating dependencies ==="
            .venv/bin/pip install -r requirements.txt --quiet

            echo "=== Ensuring PostgreSQL is running ==="
            # EC2-local mode: PostgreSQL runs on this server.
            # systemctl start is a no-op if it's already active, so this is safe
            # to run on every deploy. Prevents migration failure when the service
            # drifts (e.g. after an EC2 stop/start cycle).
            # Guard: if the unit doesn't exist, PostgreSQL was never installed
            # (e.g. user_data.sh failed on first boot) — fail fast with a clear message.
            if ! sudo systemctl list-unit-files postgresql.service | grep -q postgresql; then
              echo "ERROR: postgresql.service not found. PostgreSQL is not installed on this server." >&2
              echo "SSH into the EC2 and run the manual setup from the project docs." >&2
              exit 1
            fi
            sudo systemctl enable postgresql  # persist across reboots
            sudo systemctl start postgresql   # no-op if already running

            echo "=== Running Alembic migrations ==="
            .venv/bin/alembic upgrade head

            echo "=== Restarting gunicorn ==="
            sudo systemctl restart gunicorn

            echo "=== Verifying gunicorn is active ==="
            systemctl is-active gunicorn
            echo "Deploy complete."
