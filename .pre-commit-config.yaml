repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff          # lint and auto-fix
        args: [--fix]
      - id: ruff-format   # format (replaces black)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # alembic/ uses runtime-injected op/context objects mypy can't resolve statically.
        # infra/ is CDK code whose library types aren't installed in the app venv.
        exclude: ^(alembic/|infra/)
        additional_dependencies:
          - sqlalchemy>=2.0.0
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - fastapi>=0.115.0
